<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- FULL ZOOM DISABLE -->
    <meta name="viewport" content="
width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
minimum-scale=1.0,
user-scalable=no,
viewport-fit=cover">

    <title>Study Mode</title>

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

            -webkit-tap-highlight-color: transparent;

            touch-action: manipulation;
        }

        html {
            width: 100%;
            height: 100%;

            overflow: hidden;

            overscroll-behavior: none;

            -webkit-text-size-adjust: 100%;
        }

        body {
            width: 100vw;
            height: 100vh;

            overflow: hidden;

            position: fixed;

            inset: 0;

            display: flex;
            justify-content: center;
            align-items: center;

            background: #070b16;

            font-family: 'Manrope', sans-serif;

            padding: 16px;
        }

        /* BACKGROUND */

        .bg {
            position: absolute;
            inset: 0;

            background:
                radial-gradient(circle at top left, #0088ff22, transparent 30%),
                radial-gradient(circle at bottom right, #7c3aed22, transparent 35%),
                #070b16;

            overflow: hidden;
        }

        /* GLOWS */

        .blur {
            position: absolute;

            width: 220px;
            height: 220px;

            border-radius: 50%;

            background: #0088ff22;

            filter: blur(70px);

            top: -60px;
            left: -60px;

            animation: float 8s ease-in-out infinite;
        }

        .blur2 {
            position: absolute;

            width: 220px;
            height: 220px;

            border-radius: 50%;

            background: #7c3aed22;

            filter: blur(70px);

            right: -60px;
            bottom: -60px;

            animation: float2 9s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(20px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        @keyframes float2 {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-20px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        /* CARD */

        .card {
            width: 100%;
            max-width: 400px;

            position: relative;
            z-index: 10;

            padding: 40px 24px;

            border-radius: 28px;

            text-align: center;

            overflow: hidden;

            background:
                linear-gradient(180deg,
                    rgba(255, 255, 255, .06),
                    rgba(255, 255, 255, .03));

            border: 1px solid rgba(255, 255, 255, .08);

            backdrop-filter: blur(22px);

            box-shadow:
                0 20px 60px rgba(0, 0, 0, .55);
        }

        /* TOP LINE */

        .top-line {
            position: absolute;

            top: 0;
            left: 0;

            width: 100%;
            height: 3px;

            background:
                linear-gradient(90deg,
                    #00d2ff,
                    #7c3aed,
                    #00d2ff);
        }

        /* ICON */

        .circle {
            width: 74px;
            height: 74px;

            margin: auto;

            border-radius: 50%;

            background:
                linear-gradient(135deg,
                    #0088ff,
                    #005eff);

            display: flex;
            justify-content: center;
            align-items: center;

            color: white;

            font-size: 32px;

            box-shadow:
                0 12px 30px rgba(0, 136, 255, .35);

            margin-bottom: 24px;
        }

        /* TITLE */

        h1 {
            font-size: 38px;

            font-weight: 800;

            line-height: 1.1;

            margin-bottom: 16px;

            color: white;
        }

        .gradient {
            background:
                linear-gradient(90deg,
                    #00d2ff,
                    #7c3aed);

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* DESCRIPTION */

        p {
            color: rgba(255, 255, 255, .65);

            font-size: 14px;

            line-height: 1.8;

            margin-bottom: 28px;
        }

        /* BUTTON */

        .btn {
            width: 100%;

            height: 56px;

            border: none;

            border-radius: 18px;

            background:
                linear-gradient(135deg,
                    #0088ff,
                    #005eff,
                    #7c3aed);

            color: white;

            font-size: 15px;

            font-weight: 700;

            cursor: pointer;

            position: relative;

            overflow: hidden;

            transition: .3s;

            box-shadow:
                0 12px 30px rgba(0, 136, 255, .35);
        }

        .btn:active {
            transform: scale(.98);
        }

        /* SHINE */

        .btn::before {
            content: '';

            position: absolute;

            top: 0;
            left: -130%;

            width: 80px;
            height: 100%;

            background: rgba(255, 255, 255, .22);

            transform: skewX(-25deg);

            transition: .8s;
        }

        .btn:hover::before {
            left: 130%;
        }

        /* FOOTER */

        .footer {
            margin-top: 18px;

            color: rgba(255, 255, 255, .3);

            font-size: 10px;

            letter-spacing: 1px;
        }

        /* DESKTOP */

        @media(min-width:700px) {

            .card {
                max-width: 430px;
                padding: 48px 34px;
            }

            h1 {
                font-size: 48px;
            }

            p {
                font-size: 15px;
            }

            .circle {
                width: 88px;
                height: 88px;
                font-size: 38px;
            }

            .btn {
                height: 60px;
                font-size: 16px;
            }

        }
    </style>
</head>

<body>

    <div class="bg"></div>

    <div class="blur"></div>

    <div class="blur2"></div>

    <div class="card">

        <div class="top-line"></div>

        <div class="circle">
            ✈
        </div>

        <h1>
            <span class="gradient">
                Study Mode
            </span>
        </h1>

        <p>
            Join our Telegram channel to access premium notes, updates, resources and advanced study materials
            instantly.
        </p>

        <button class="btn" onclick="window.open('https://t.me/YOUR_CHANNEL_USERNAME')">

            Join Telegram Channel

        </button>

        <div class="footer">
            NEXT GEN LEARNING PLATFORM
        </div>

    </div>

</body>

</html>
