<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- FIXED VIEWPORT -->
    <meta name="viewport" content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

    <title>Study Mode</title>

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #070b16;
            position: relative;
            font-family: 'Manrope', sans-serif;
            padding: 18px;
        }

        /* Background */

        .bg {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at top left, #0088ff22, transparent 30%),
                radial-gradient(circle at bottom right, #7c3aed22, transparent 35%),
                #070b16;
        }

        /* Floating Blur */

        .blur {
            position: absolute;
            width: 340px;
            height: 340px;
            border-radius: 50%;
            background: #0088ff22;
            filter: blur(80px);
            top: -100px;
            left: -100px;
            animation: float 8s ease-in-out infinite;
        }

        .blur2 {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: #7c3aed22;
            filter: blur(80px);
            right: -100px;
            bottom: -100px;
            animation: float2 9s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(24px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        @keyframes float2 {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-24px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        /* Card */

        .card {
            width: 100%;
            max-width: 410px;

            padding: 42px 24px;

            border-radius: 30px;

            background:
                linear-gradient(180deg,
                    rgba(255, 255, 255, .06),
                    rgba(255, 255, 255, .03));

            border: 1px solid rgba(255, 255, 255, .08);

            backdrop-filter: blur(22px);

            box-shadow:
                0 20px 60px rgba(0, 0, 0, .55);

            text-align: center;

            position: relative;
            z-index: 5;

            overflow: hidden;
        }

        /* Top Gradient Line */

        .top-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;

            background:
                linear-gradient(90deg,
                    #00d2ff,
                    #7c3aed,
                    #00d2ff);
        }

        /* Telegram Circle */

        .circle {
            width: 78px;
            height: 78px;

            margin: auto;

            border-radius: 50%;

            background:
                linear-gradient(135deg,
                    #0088ff,
                    #005eff);

            display: flex;
            justify-content: center;
            align-items: center;

            color: white;
            font-size: 34px;

            box-shadow:
                0 15px 35px rgba(0, 136, 255, .35);

            margin-bottom: 26px;
        }

        /* Heading */

        h1 {
            font-size: 40px;
            line-height: 1.1;
            font-weight: 800;
            color: white;
            margin-bottom: 16px;
        }

        .gradient {
            background:
                linear-gradient(90deg,
                    #00d2ff,
                    #7c3aed);

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Description */

        p {
            color: rgba(255, 255, 255, .65);
            font-size: 14px;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        /* Button */

        .btn {
            width: 100%;
            height: 58px;

            border: none;
            border-radius: 18px;

            background:
                linear-gradient(135deg,
                    #0088ff,
                    #005eff,
                    #7c3aed);

            color: white;
            font-size: 15px;
            font-weight: 700;

            cursor: pointer;

            transition: .3s;

            position: relative;
            overflow: hidden;

            box-shadow:
                0 12px 30px rgba(0, 136, 255, .35);
        }

        .btn:active {
            transform: scale(.98);
        }

        /* Shine */

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -130%;
            width: 90px;
            height: 100%;

            background: rgba(255, 255, 255, .22);

            transform: skewX(-25deg);

            transition: .8s;
        }

        .btn:hover::before {
            left: 130%;
        }

        /* Footer */

        .footer {
            margin-top: 18px;
            color: rgba(255, 255, 255, .32);
            font-size: 10px;
            letter-spacing: 1px;
        }

        /* Desktop */

        @media(min-width:700px) {

            .card {
                max-width: 450px;
                padding: 50px 34px;
            }

            h1 {
                font-size: 48px;
            }

            p {
                font-size: 15px;
            }

            .circle {
                width: 90px;
                height: 90px;
                font-size: 40px;
            }

            .btn {
                height: 62px;
                font-size: 16px;
            }

        }
    </style>
</head>

<body>

    <div class="bg"></div>

    <div class="blur"></div>
    <div class="blur2"></div>

    <div class="card">

        <div class="top-line"></div>

        <div class="circle">
            ✈
        </div>

        <h1>
            <span class="gradient">Study Mode</span>
        </h1>

        <p>
            Join our Telegram channel to access premium notes, updates, resources and advanced study materials
            instantly.
        </p>

        <button class="btn" onclick="window.open('https://t.me/YOUR_CHANNEL_USERNAME')">
            Join Telegram Channel
        </button>

        <div class="footer">
            NEXT GEN LEARNING PLATFORM
        </div>

    </div>

</body>

</html>
